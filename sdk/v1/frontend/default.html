<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<title>Login</title>
	</head>
	<body>
		<div class="registro">
			<h1>Registro de usuarios</h1>
			<form action="/register" method="post">
				<label>Usuario:</label>
				<input name="username" required><br>
				<label>Password:</label>
				<input type="password" name="password" required><br>
				<button type="submit">Crear usuario</button>
			</form>
			<button id="btnMsg">Mostrar mensaje en el servidor</button>
		</div>

		<div class="login">
			<h1>Login de Usuario</h1>
			<form action="/login" method="get">
				<label>Usuario:</label>
				<input name="username" required><br>
				<label>Password:</label>
				<input type="password" name="password" required><br>
				<button type="submit">Ingresar</button>
			</form>
		</div>

	</body>

	<script>

	function onBtnMsgOnClick()
	{
		console.log("Enviando petición al servidor...");

		fetch( "/showMessage");
	}

	function main()
	{
		btnMsg.onclick = onBtnMsgOnClick;		
	}

	window.onload = main;

	</script>
</html>
